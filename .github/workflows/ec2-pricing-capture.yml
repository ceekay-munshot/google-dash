name: AWS EC2 Pricing Daily Capture

# Runs every calendar day. Three UTC slots that bracket the 10:00-12:00 ET
# capture window across DST so at least one slot lands inside the window.
# The endpoint enforces the time-of-day window in handler — the cron is
# just the trigger fan-out, not the gate.
#   14:17 UTC = 09:17 EST / 10:17 EDT  (inside window during EDT only)
#   15:08 UTC = 10:08 EST / 11:08 EDT  (inside window year-round)
#   15:42 UTC = 10:42 EST / 11:42 EDT  (inside window year-round)
on:
  schedule:
    - cron: '17 14 * * *'
    - cron: '8 15 * * *'
    - cron: '42 15 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'prod | preview (default: prod)'
        required: false
        default: 'prod'
      force:
        description: "true = overwrite today's run + bypass ET-window check"
        required: false
        default: 'false'

concurrency:
  group: aws-ec2-pricing-capture-${{ inputs.target || 'prod' }}
  cancel-in-progress: false

jobs:
  capture:
    name: Capture EC2 on-demand pricing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Resolve dashboard URL by target
        id: target
        env:
          TARGET:        ${{ inputs.target || 'prod' }}
          PROD_URL:      ${{ secrets.HISTORY_CAPTURE_URL_PROD }}
          PREVIEW_URL:   ${{ secrets.HISTORY_CAPTURE_URL_PREVIEW }}
          LEGACY_URL:    ${{ secrets.HISTORY_CAPTURE_URL }}
        run: |
          if [ "$TARGET" = "preview" ]; then
            URL="$PREVIEW_URL"
          else
            URL="${PROD_URL:-$LEGACY_URL}"  # fall back to legacy secret for prod if PROD_URL not set yet
          fi
          if [ -z "$URL" ]; then
            echo "::error::No dashboard URL configured for target=$TARGET"
            echo "  Set HISTORY_CAPTURE_URL_PROD or HISTORY_CAPTURE_URL_PREVIEW (and HISTORY_CAPTURE_URL as a legacy fallback)."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # AWS EC2 pricing capture uses AWS_EC2_PRICING_CAPTURE_SECRET (dedicated
      # to this workflow). HISTORY_CAPTURE_SECRET is a backward-compat fallback
      # so prod keeps working until the dedicated secret is set in both GitHub
      # Actions and the Cloudflare Pages env vars. Once both sides are wired
      # up, the legacy fallback can be dropped.
      - name: Validate auth secret
        env:
          CAPTURE_SECRET: ${{ secrets.AWS_EC2_PRICING_CAPTURE_SECRET || secrets.HISTORY_CAPTURE_SECRET }}
        run: |
          if [ -z "$CAPTURE_SECRET" ]; then
            echo "::error::Neither AWS_EC2_PRICING_CAPTURE_SECRET nor HISTORY_CAPTURE_SECRET is set"
            exit 1
          fi

      - name: Fetch + parse AWS Price List CSV → JSON
        id: parse
        run: |
          PAYLOAD="${RUNNER_TEMP}/payload.json"
          node scripts/fetch-aws-ec2-pricing.mjs --stdout > "$PAYLOAD"
          ROWS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$PAYLOAD')).rows.length)")
          BYTES=$(wc -c < "$PAYLOAD")
          echo "Parsed $ROWS rows ($BYTES bytes)"
          echo "payload=$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "rows=$ROWS" >> "$GITHUB_OUTPUT"

      - name: Multi-phase capture (begin → rows → finalize)
        id: capture
        env:
          DASHBOARD_URL: ${{ steps.target.outputs.url }}
          SECRET:        ${{ secrets.AWS_EC2_PRICING_CAPTURE_SECRET || secrets.HISTORY_CAPTURE_SECRET }}
          PAYLOAD:       ${{ steps.parse.outputs.payload }}
          FORCE:         ${{ inputs.force || 'false' }}
        run: node scripts/aws-ec2-capture-multiphase.mjs

      - name: Open / update issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER:   ${{ github.event_name }}
          TARGET:    ${{ inputs.target || 'prod' }}
        with:
          script: |
            const TITLE = '🔴 AWS EC2 pricing capture failing (' + process.env.TARGET + ')';
            const nowUTC = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const summary = [
              '**Run:** ' + process.env.RUN_URL,
              '**When:** ' + nowUTC,
              '**Trigger:** ' + process.env.TRIGGER,
              '**Target:** ' + process.env.TARGET,
              '',
              '---',
              'This issue auto-opens when the daily AWS EC2 pricing capture fails ' +
              'and auto-comments on each subsequent failure. Close it once the ' +
              'underlying issue is fixed; the next failure will open a fresh one.',
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'aws-ec2-pricing-capture-failure',
              per_page: 50,
            });
            const existing = openIssues.find(i => i.title === TITLE);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                body: '### New failure\n\n' + summary,
              });
              core.notice('Posted comment on existing issue #' + existing.number);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: TITLE,
                body:  '### Initial failure\n\n' + summary,
                labels: ['aws-ec2-pricing-capture-failure'],
              });
              core.notice('Opened new issue #' + created.number);
            }
