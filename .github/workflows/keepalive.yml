name: Keepalive — prevent scheduled-workflow auto-disable

# GitHub disables scheduled workflows after a period of repository inactivity
# (no commits to the default branch). The exact threshold has historically been
# documented as 60 days. To make the daily History Capture cron survive long
# stretches with no other activity, this workflow pushes a tiny heartbeat
# update to `.github/keepalive.txt` every 25 days. That keeps the inactivity
# counter resetting well below the disable threshold.
#
# Why a real commit (not just a workflow_dispatch or API ping):
#   GitHub's auto-disable is triggered by *commits to the default branch*,
#   not by API activity or workflow_dispatch. Touching a file is the only
#   reliable way to reset the counter.
#
# Why this file lives under .github (and not at the repo root):
#   - It keeps the heartbeat near the workflow that depends on it
#   - Cloudflare Pages still rebuilds on every push to main (the heartbeat
#     commit is included), but the rebuild is fast (no compile step) and
#     happens at most ~14× per year — negligible cost.

on:
  schedule:
    # Every 25 days, at 04:17 UTC. Chosen to:
    #   - Stay well under 60-day disable threshold (with margin for cron drift)
    #   - Land at a quiet UTC hour
    #   - Use an off-minute to dodge the GitHub :00/:30 queue
    # Cron note: `*/25` doesn't reliably mean "every 25 days" because months
    # have variable length, but it does fire at least once every 25 days,
    # which is all we need.
    - cron: '17 4 */25 * *'

  # Manual run: GitHub UI → Actions → "Keepalive" → Run workflow
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional note (audit only)'
        required: false
        default: 'manual keepalive'

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  heartbeat:
    name: Push heartbeat commit
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the auto-provided GITHUB_TOKEN with contents:write scope to
          # push the heartbeat commit. No PAT, no extra secrets needed.
          persist-credentials: true
          fetch-depth: 1

      - name: Update heartbeat file
        env:
          REASON: ${{ github.event.inputs.reason || 'scheduled' }}
        run: |
          set -euo pipefail
          mkdir -p .github
          NOW="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "# Keepalive heartbeat"
            echo ""
            echo "Last update: ${NOW}"
            echo "Trigger: ${{ github.event_name }} (${REASON})"
            echo ""
            echo "Purpose: a tiny periodic commit to prevent GitHub from"
            echo "auto-disabling the daily History Capture scheduled workflow."
            echo "See .github/workflows/keepalive.yml for details."
          } > .github/keepalive.txt

      - name: Commit and push heartbeat
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage before checking: `git diff` ignores untracked files, so a
          # brand-new heartbeat file reads as "no change" and never gets
          # committed. Only `git diff --cached` after `git add` sees it.
          git add .github/keepalive.txt
          # The file embeds a fresh timestamp, so "unchanged" is impossible in
          # a healthy run — treat it as a loud failure, never a quiet skip.
          if git diff --cached --quiet -- .github/keepalive.txt; then
            echo "::error::Heartbeat file unchanged after rewrite — keepalive is broken and the inactivity timer is NOT being reset."
            exit 1
          fi
          # Two-line commit body via printf so it survives YAML literal-block
          # parsing (un-indented continuation lines would break out of `run: |`).
          MSG="$(printf 'chore(ci): keepalive heartbeat %s\n\nAuto-generated by .github/workflows/keepalive.yml to keep the daily\nHistory Capture scheduled workflow from being auto-disabled.' "$(date -u '+%Y-%m-%d')")"
          git commit -m "$MSG"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "Pushed heartbeat commit."

      - name: Summary
        if: always()
        run: |
          echo "### Keepalive Run"                          >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}"        >> $GITHUB_STEP_SUMMARY
          echo "- Reason: ${{ github.event.inputs.reason || 'scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}"                >> $GITHUB_STEP_SUMMARY
