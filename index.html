<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Model Intelligence Dashboard</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#111827}#root{min-height:100vh}</style>
  <script>
  // Auto-resize the Open Router Pricing History iframe to fit its content
  // (embed uses postMessage from /api/pricepertoken-history-proxy).
  window.addEventListener('message', function(e){
    var d = e && e.data;
    if (!d || d.__ppt !== 'history-height' || typeof d.height !== 'number') return;
    var frames = document.querySelectorAll('iframe[title="Open Router Pricing History"]');
    for (var i = 0; i < frames.length; i++) {
      if (e.source && frames[i].contentWindow !== e.source) continue;
      frames[i].style.height = Math.max(300, Math.ceil(d.height)) + 'px';
    }
  });
  </script>
</head>
<body>
  <div id="root"></div>
  <script>(function(){
  var LS_KEY='gdash_v2_history';

        or:(orData||[]).map(function(m){return{rank:m.rank,model:m.model,provider:m.provider,tokRaw:m.tokRaw||0,isGemini:m.isGemini,wowN:m.wowN||0}}),
        bots:(botsData||[]).map(function(b){return{name:b.name,pct:b.pct}}),
        trends:(trendsData||[]).map(function(t){return{term:t.term,score:t.score}}),
        filing:filingData&&filingData.success?{period:filingData.period,searchRevenue:filingData.searchRevenue,searchRevenueGrowth:filingData.searchRevenueGrowth,paidClicksGrowth:filingData.paidClicksGrowth,cpcGrowth:filingData.cpcGrowth,totalRevenue:filingData.totalRevenue,totalRevenueGrowth:filingData.totalRevenueGrowth}:null
      };
      snaps=[...snaps,snap].slice(-MAX_SNAPS);
      lsSet(snaps);

      _listeners.forEach(function(fn){try{fn(snaps)}catch(e){}});
      window.dispatchEvent(new CustomEvent('ghist-update',{detail:{count:snaps.length}}));
    },
    clear:function(){snaps=[];lsRm();_listeners.forEach(function(fn){try{fn(snaps)}catch(e){}});},

  };

     After 500ms of no new marks, flush whatever we have into
     a snapshot. Works for both "Refresh all" and individual
     tab refreshes — any successful fetch triggers a save. */
  var _pending = null;
  var _markTimer = null;
  window.__ghistMark = function(name, data) {
    if (!_pending) _pending = {};
    _pending[name] = data;
    clearTimeout(_markTimer);
    _markTimer = setTimeout(function(){
      var p = _pending;
      _pending = null;
      if (p && p.or && p.or.length) {
        window.__ghist.save(p.or, p.bots||[], p.trends||[], p.filing||null);
      }
    }, 500);
  };
})();

        get length(){ return Object.keys(_store).length; }
      },
      writable: false, configurable: true
    });
  }
})();

<script>
(function(){
  window.addEventListener('ghist-update', function() {
    try {
      var snaps = window.__ghist ? window.__ghist.snaps : null;
      var btns = Array.from(document.querySelectorAll('button'));
      var histBtn = btns.find(function(b){ return b.textContent.trim() === 'History'; });
      var orBtn   = btns.find(function(b){ return b.textContent.trim() === 'OpenRouter'; });
      if(!histBtn || !orBtn) return;
      var style = histBtn.style.background || window.getComputedStyle(histBtn).background;
      var isActive = style.includes('111827') || style.includes('rgb(17, 24, 39)');
      if(!isActive) return;
      // After Clear: snaps is empty — click OR then back to History so React
      // re-reads window.__ghist.snaps and shows "No history yet"
      // After Save: snaps has data — same toggle shows the new snapshot
      orBtn.click();
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ histBtn.click(); });
      });
    } catch(e) {}
  });
})();
</script>
