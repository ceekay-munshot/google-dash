# google-dash — Cloudflare Pages project configuration
#
# IMPORTANT — why the kv_namespaces block is commented out:
#   Cloudflare Pages validates wrangler.toml at deploy time. Invalid placeholder
#   UUIDs in the kv_namespaces section caused every deploy since commit 071ef8b
#   to fail silently — production was frozen at an older successful build and
#   every /api/* route was returning the SPA HTML fallback instead of executing
#   Pages Functions. With this block commented out, CF Pages falls back to
#   bindings configured in the Cloudflare dashboard (Workers & Pages → google-
#   dash → Settings → Functions → KV namespace bindings).
#
#   To re-enable wrangler.toml-managed bindings: replace PRODUCTION_KV_ID and
#   PREVIEW_KV_ID below with the real UUIDs from the dashboard and uncomment.
#   Until then, history-capture / history-read / pricing-history depend on
#   the dashboard binding being set manually. The provider-pricing-matrix
#   endpoint needs no KV and will work either way.

name = "google-dash"
compatibility_date = "2024-09-23"

# Required by Cloudflare Pages v2 build strategy. Without this property Pages
# logs "A Wrangler configuration file was found but it does not appear to be
# valid. … Skipping file and continuing." and silently ignores the entire
# file. Functions auto-detection from /functions still works, but any
# toml-managed binding/env-var would be lost. Assets live at repo root with
# no build step, so the output dir is "./".
pages_build_output_dir = "./"

# [[kv_namespaces]]
# binding = "HISTORY_KV"
# id = "PRODUCTION_KV_ID"
# preview_id = "PREVIEW_KV_ID"
