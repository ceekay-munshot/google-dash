# google-dash — Cloudflare Pages project configuration
#
# HISTORY_KV binding:
#   Previously the kv_namespaces block was commented out because placeholder
#   UUIDs caused deploy validation to fail silently (freezing production at an
#   older build). Real UUIDs are now wired in and the block is enforced via
#   wrangler.toml — this gives us config-as-code that survives dashboard edits
#   and applies identically across production and preview environments
#   (preview was missing the binding in the dashboard, which caused the
#   "Quarter service temporarily unavailable" banner to appear on preview
#   deploys — see /api/gpu-hardware-pricing-history's env?.HISTORY_KV guard).
#
# Same namespace used for both production and preview (preview_id === id) so
# the preview deploys see the same history store as production. If you want
# isolation later (e.g. a sandbox preview KV that can be wiped without
# affecting prod), replace preview_id with a distinct KV namespace UUID.

name = "google-dash"
compatibility_date = "2024-09-23"

# Required by Cloudflare Pages v2 build strategy. Without this property Pages
# logs "A Wrangler configuration file was found but it does not appear to be
# valid. … Skipping file and continuing." and silently ignores the entire
# file. Functions auto-detection from /functions still works, but any
# toml-managed binding/env-var would be lost. Assets live at repo root with
# no build step, so the output dir is "./".
pages_build_output_dir = "./"

[[kv_namespaces]]
binding = "HISTORY_KV"
id = "322b0ca12e874e6a8568126e182e59f5"
preview_id = "322b0ca12e874e6a8568126e182e59f5"

# ─────────────────────────────────────────────────────────────────────
# AWS EC2 pricing time-series (Cloudflare D1)
#
# This block is intentionally COMMENTED OUT until two D1 databases have
# been created and their real UUIDs pasted in below. Cloudflare Pages
# silently freezes deploys at an older build when wrangler.toml has
# placeholder/invalid UUIDs (same hazard the HISTORY_KV comment block
# documents above) — keeping the block commented avoids that.
#
# Setup steps (one-time):
#   1. npx wrangler d1 create gdash-aws-ec2-pricing            # → prints prod database_id
#   2. npx wrangler d1 create gdash-aws-ec2-pricing-preview    # → prints preview database_id
#   3. Paste both UUIDs into the placeholders below.
#   4. Uncomment the entire `[[d1_databases]]` block.
#   5. npx wrangler d1 migrations apply gdash-aws-ec2-pricing-preview --local
#      npx wrangler d1 migrations apply gdash-aws-ec2-pricing-preview --remote
#      npx wrangler d1 migrations apply gdash-aws-ec2-pricing         --remote
#   6. git commit + push wrangler.toml so prod + preview deploys both
#      bind EC2_PRICING_DB on the next Cloudflare Pages build.
#
# DO NOT collapse prod + preview onto one database_id (the way HISTORY_KV
# does above). Forward daily captures and historical backfill writes
# from a preview deploy MUST NOT corrupt the production trend data.
#
# [[d1_databases]]
# binding             = "EC2_PRICING_DB"
# database_name       = "gdash-aws-ec2-pricing"
# database_id         = "<paste prod UUID from step 1>"
# preview_database_id = "<paste preview UUID from step 2>"
# migrations_dir      = "migrations"
