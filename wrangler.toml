# google-dash — Cloudflare Pages project configuration
# This file defines KV namespace bindings for persistent history storage.
# Pages Functions access these via context.env or destructured { env }.

name = "google-dash"
compatibility_date = "2024-09-23"

# ── KV Namespaces ──────────────────────────────────────────
# Create these in Cloudflare dashboard → Workers & Pages → KV
# then paste the IDs here. Use different IDs for preview vs production.

[[kv_namespaces]]
binding = "HISTORY_KV"
id = "REPLACE_WITH_PRODUCTION_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
