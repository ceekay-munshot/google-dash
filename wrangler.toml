# google-dash — Cloudflare Pages project configuration
#
# HISTORY_KV binding:
#   Previously the kv_namespaces block was commented out because placeholder
#   UUIDs caused deploy validation to fail silently (freezing production at an
#   older build). Real UUIDs are now wired in and the block is enforced via
#   wrangler.toml — this gives us config-as-code that survives dashboard edits
#   and applies identically across production and preview environments
#   (preview was missing the binding in the dashboard, which caused the
#   "Quarter service temporarily unavailable" banner to appear on preview
#   deploys — see /api/gpu-hardware-pricing-history's env?.HISTORY_KV guard).
#
# Same namespace used for both production and preview (preview_id === id) so
# the preview deploys see the same history store as production. If you want
# isolation later (e.g. a sandbox preview KV that can be wiped without
# affecting prod), replace preview_id with a distinct KV namespace UUID.

name = "google-dash"
compatibility_date = "2024-09-23"

# Required by Cloudflare Pages v2 build strategy. Without this property Pages
# logs "A Wrangler configuration file was found but it does not appear to be
# valid. … Skipping file and continuing." and silently ignores the entire
# file. Functions auto-detection from /functions still works, but any
# toml-managed binding/env-var would be lost. Assets live at repo root with
# no build step, so the output dir is "./".
pages_build_output_dir = "./"

[[kv_namespaces]]
binding = "HISTORY_KV"
id = "322b0ca12e874e6a8568126e182e59f5"
preview_id = "322b0ca12e874e6a8568126e182e59f5"
